{% extends 'blog/base.html' %}

{% block content %}

<div class="container mt-5">

    <div class="row justify-content-center">

        <div class="col-lg-7 col-md-9">

            <div class="card shadow-lg border-0 text-dark rounded-4 text-center p-4">

                <div class="card-header bg-white border-0">
                    <h3 class="fw-bold">Confirm Delete</h3>
                    <p class="text-muted mb-0">
                        Are you sure you want to delete this post? This action cannot be undone.
                    </p>
                </div>

                <div class="card-body mt-4">
                    <h5 class="mb-4">{{ object.title }}</h5>
                    <p class="text-muted mb-4">{{ object.content|truncatewords:20 }}</p>

                    <form method="POST">
                        {% csrf_token %}
                        <div class="d-flex justify-content-between">

                            <a href="{% url 'post-detail' object.id %}" class="btn btn-secondary">
                                Cancel
                            </a>

                            <button type="submit" class="btn btn-danger">
                                Delete Post
                            </button>

                        </div>
                    </form>
                </div>

            </div>

        </div>

    </div>

</div>

{% endblock content %}
