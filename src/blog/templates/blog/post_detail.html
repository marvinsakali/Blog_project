{% extends 'blog/base.html' %}
{% block content %}

<!-- Page content-->
<div class="container mt-5">
    <div class="row">
        <div class="col-lg-8">

            <!-- Post content-->
            <article>

                <!-- Post header-->
                <header class="mb-4">

                    <!-- Post title-->
                    <h1 class="fw-bolder mb-1">
                        {{ object.title }}
                    </h1>

                    <!-- Author + Date -->
                     <div class="mb-2">
                        <small class="btn btn-outline-info btn-sm px-2" >{{ object.category }}</small>
                    </div>
                    <div class="d-flex align-items-center text-muted fst-italic mb-2">

                        <img src="{{ object.author.profile.image.url }}"
                             class="rounded-circle me-2"
                             style="width:30px;height:30px;object-fit:cover;">

                        <div class="ml-2">
                            Posted on {{ object.date_posted|date:"F d, Y" }} by
                            <a href="{% url 'user-posts' object.author.username %}">
                                {{ object.author }}
                            </a>
                        </div>

                    </div>
                     
                    <hr/>
                    {% if object.author == user %}
                    <div class="mb-2">
                        <a href="{% url 'post-update' object.id %}" class="btn btn-sm btn-outline-secondary">
                            Update
                        </a>

                        <a href="{% url 'post-delete' object.id %}" class="btn btn-sm btn-danger">
                            Delete
                        </a>
                    </div>
                    
                   
                    {% endif %}

                </header>

                <!-- Featured Image -->
                <figure class="mb-4">
                    <img class="img-fluid rounded"
                         src="https://dummyimage.com/900x400/ced4da/6c757d.jpg"
                         alt="Post Image">
                </figure>

                <!-- Post content (HTML enabled) -->
                <section class="mb-5 post-content">

                    {{ object.content|safe }}

                </section>

            </article>

        </div>
    </div>
</div>

{% endblock content %}
